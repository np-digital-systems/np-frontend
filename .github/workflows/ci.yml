name: Frontend CI

on:
  pull_request:
    branches: [main, master]

jobs:
  verify-code:
    runs-back: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Linting
        run: npm run lint

      - name: Check TypeScript Compilation
        run: npm run build 
